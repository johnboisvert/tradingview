<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Tracker - Trading Dashboard Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e2e8f0;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
            color: white;
        }
        
        .header p {
            color: rgba(255, 255, 255, 0.9);
        }
        
        .form-section {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #06b6d4;
        }
        
        select, input {
            width: 100%;
            padding: 12px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(6, 182, 212, 0.5);
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 1em;
            transition: all 0.3s;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: #06b6d4;
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.3);
        }
        
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }
        
        button {
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            color: white;
            grid-column: 1 / -1;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(6, 182, 212, 0.3);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: rgba(6, 182, 212, 0.2);
            color: #06b6d4;
            border: 1px solid #06b6d4;
        }
        
        .btn-secondary:hover {
            background: rgba(6, 182, 212, 0.3);
        }
        
        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid #22c55e;
            color: #86efac;
            display: block;
        }
        
        .message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #fca5a5;
            display: block;
        }
        
        .message.loading {
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid #06b6d4;
            color: #06b6d4;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(6, 182, 212, 0.3);
            border-top-color: #06b6d4;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-label {
            color: rgba(226, 232, 240, 0.7);
            font-size: 0.9em;
            margin-bottom: 10px;
        }
        
        .stat-value {
            font-size: 1.8em;
            color: #06b6d4;
            font-weight: bold;
        }
        
        .holdings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .exchange-card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 12px;
            padding: 20px;
        }
        
        .exchange-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(6, 182, 212, 0.2);
        }
        
        .exchange-name {
            font-size: 1.3em;
            color: #06b6d4;
            font-weight: bold;
        }
        
        .exchange-value {
            font-size: 1.1em;
            color: #22c55e;
        }
        
        .asset-list {
            list-style: none;
        }
        
        .asset-item {
            padding: 10px 0;
            border-bottom: 1px solid rgba(6, 182, 212, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .asset-item:last-child {
            border-bottom: none;
        }
        
        .asset-symbol {
            color: #06b6d4;
            font-weight: 600;
        }
        
        .asset-amount {
            color: rgba(226, 232, 240, 0.8);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔗 Portfolio Tracker</h1>
            <p>Connectez vos exchanges et suivez vos holdings en temps réel</p>
        </div>
        
        <div class="form-section">
            <h2 style="margin-bottom: 20px; color: #06b6d4;">Connecter un Exchange</h2>
            
            <div id="message" class="message"></div>
            
            <form id="portfolioForm">
                <div class="form-group">
                    <label for="exchange">Sélectionnez un Exchange:</label>
                    <select id="exchange" required>
                        <option value="">-- Choisir --</option>
                        <option value="binance">Binance</option>
                        <option value="mexc">MEXC</option>
                        <option value="coinbase">Coinbase</option>
                        <option value="bitget">Bitget</option>
                        <option value="kraken">Kraken</option>
                        <option value="bybit">Bybit</option>
                        <option value="okx">OKX</option>
                        <option value="ftx">FTX</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="apiKey">Clé API:</label>
                    <input type="text" id="apiKey" placeholder="Entrez votre clé API" required>
                </div>
                
                <div class="form-group">
                    <label for="apiSecret">Secret API:</label>
                    <input type="password" id="apiSecret" placeholder="Entrez votre secret API" required>
                </div>
                
                <div class="form-group">
                    <label for="passphrase">Passphrase (optionnel - pour Coinbase, Bitget, OKX):</label>
                    <input type="password" id="passphrase" placeholder="Passphrase si nécessaire">
                </div>
                
                <div class="button-group">
                    <button type="submit" class="btn-primary">🔗 Connecter</button>
                    <button type="button" class="btn-secondary" onclick="refreshData()">🔄 Rafraîchir</button>
                </div>
            </form>
        </div>
        
        <div id="statsContainer" style="display:none;">
            <div class="stats-grid" id="stats"></div>
            <div class="holdings-grid" id="holdings"></div>
        </div>
    </div>
    
    <script>
        const API_BASE = window.location.origin;
        
        function showMessage(text, type = 'info') {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
            
            if (type !== 'loading') {
                setTimeout(() => {
                    msg.className = 'message';
                }, 5000);
            }
        }
        
        function showLoading() {
            const msg = document.getElementById('message');
            msg.innerHTML = '<div class="spinner"></div> Connexion en cours...';
            msg.className = 'message loading';
        }
        
        document.getElementById('portfolioForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const exchange = document.getElementById('exchange').value;
            const apiKey = document.getElementById('apiKey').value;
            const apiSecret = document.getElementById('apiSecret').value;
            const passphrase = document.getElementById('passphrase').value;
            
            if (!exchange || !apiKey || !apiSecret) {
                showMessage('❌ Remplissez tous les champs obligatoires!', 'error');
                return;
            }
            
            showLoading();
            
            try {
                const response = await fetch(`${API_BASE}/api/portfolio/connect`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        exchange,
                        api_key: apiKey,
                        api_secret: apiSecret,
                        passphrase: passphrase || null
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage(`✅ ${data.message}`, 'success');
                    document.getElementById('portfolioForm').reset();
                    loadPortfolioData();
                } else {
                    showMessage(`❌ ${data.message}`, 'error');
                }
            } catch (error) {
                console.error('Erreur:', error);
                showMessage(`❌ Erreur de connexion: ${error.message}`, 'error');
            }
        });
        
        async function loadPortfolioData() {
            try {
                const response = await fetch(`${API_BASE}/api/portfolio/data`, {
                    credentials: 'include'
                });
                
                const data = await response.json();
                
                if (data.success && data.number_of_exchanges > 0) {
                    updateUI(data);
                }
            } catch (error) {
                console.error('Erreur lors du chargement:', error);
            }
        }
        
        async function refreshData() {
            showLoading();
            
            try {
                const response = await fetch(`${API_BASE}/api/portfolio/refresh`, {
                    method: 'POST',
                    credentials: 'include'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage(`✅ ${data.message}`, 'success');
                    loadPortfolioData();
                } else {
                    showMessage(`❌ ${data.message}`, 'error');
                }
            } catch (error) {
                showMessage(`❌ Erreur: ${error.message}`, 'error');
            }
        }
        
        function updateUI(data) {
            document.getElementById('statsContainer').style.display = 'block';
            
            // Stats
            const statsHtml = `
                <div class="stat-card">
                    <div class="stat-label">Valeur Totale</div>
                    <div class="stat-value">$${data.total_portfolio_value.toLocaleString('fr-FR', {maximumFractionDigits: 2})}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Nombre d'Exchanges</div>
                    <div class="stat-value">${data.number_of_exchanges}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Assets Connectés</div>
                    <div class="stat-value">${Object.values(data.exchanges).reduce((sum, ex) => sum + ex.count, 0)}</div>
                </div>
            `;
            document.getElementById('stats').innerHTML = statsHtml;
            
            // Holdings
            let holdingsHtml = '';
            for (const [exchange, holdings] of Object.entries(data.exchanges)) {
                let assetsHtml = '';
                holdings.holdings.forEach(asset => {
                    assetsHtml += `
                        <li class="asset-item">
                            <span class="asset-symbol">${asset.symbol}</span>
                            <span class="asset-amount">${asset.amount.toFixed(8)} = $${asset.value.toFixed(2)}</span>
                        </li>
                    `;
                });
                
                holdingsHtml += `
                    <div class="exchange-card">
                        <div class="exchange-header">
                            <div class="exchange-name">📊 ${exchange}</div>
                            <div class="exchange-value">$${holdings.value.toLocaleString('fr-FR', {maximumFractionDigits: 2})}</div>
                        </div>
                        <ul class="asset-list">
                            ${assetsHtml}
                        </ul>
                    </div>
                `;
            }
            document.getElementById('holdings').innerHTML = holdingsHtml;
        }
        
        // Charger au démarrage
        loadPortfolioData();
        
        // Auto-refresh toutes les 5 minutes
        setInterval(loadPortfolioData, 300000);
    </script>
</body>
</html>
