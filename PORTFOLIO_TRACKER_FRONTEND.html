<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💼 Portfolio Tracker IA - Complet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e6ed;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ============ HEADER ============ */
        .header {
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            padding: 50px;
            border-radius: 20px;
            margin-bottom: 40px;
            box-shadow: 0 10px 40px rgba(6, 182, 212, 0.3);
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 15px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        /* ============ STATS CARDS ============ */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.15) 0%, rgba(34, 197, 94, 0.1) 100%);
            border: 2px solid rgba(6, 182, 212, 0.3);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            color: #06b6d4;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1em;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: 700;
            color: #06b6d4;
            margin-bottom: 10px;
        }

        .stat-sub {
            font-size: 0.9em;
            color: #cbd5e1;
            opacity: 0.8;
        }

        /* ============ FORM ============ */
        .form-section {
            background: rgba(34, 197, 94, 0.1);
            border: 2px solid rgba(34, 197, 94, 0.3);
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 40px;
        }

        .form-section h2 {
            color: #10b981;
            margin-bottom: 25px;
            font-size: 1.8em;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            color: #10b981;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .form-group input,
        .form-group select {
            padding: 12px 15px;
            border: 2px solid rgba(34, 197, 94, 0.3);
            border-radius: 10px;
            background: rgba(15, 23, 42, 0.8);
            color: #e0e6ed;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #10b981;
            background: rgba(15, 23, 42, 0.95);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
        }

        .form-group input::placeholder {
            color: #64748b;
        }

        .buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .btn {
            padding: 14px 30px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1em;
        }

        .btn-connect {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            flex: 1;
            min-width: 200px;
        }

        .btn-connect:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
        }

        .btn-refresh {
            background: rgba(100, 116, 139, 0.2);
            color: #cbd5e1;
            border: 2px solid rgba(100, 116, 139, 0.4);
        }

        .btn-refresh:hover {
            background: rgba(100, 116, 139, 0.3);
            border-color: rgba(100, 116, 139, 0.6);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ============ MESSAGES ============ */
        .message {
            padding: 15px 20px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
            border-left: 4px solid;
            animation: slideIn 0.3s ease;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: rgba(34, 197, 94, 0.15);
            color: #10b981;
            border-left-color: #10b981;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border-left-color: #ef4444;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============ HOLDINGS TABLE ============ */
        .holdings-section {
            margin-bottom: 40px;
        }

        .holdings-section h2 {
            color: #06b6d4;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .holdings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .exchange-card {
            background: linear-gradient(135deg, rgba(10, 14, 39, 0.8) 0%, rgba(26, 31, 58, 0.8) 100%);
            border: 2px solid rgba(6, 182, 212, 0.3);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
        }

        .exchange-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid rgba(6, 182, 212, 0.2);
            padding-bottom: 15px;
        }

        .exchange-name {
            font-size: 1.4em;
            font-weight: 700;
            color: #06b6d4;
        }

        .exchange-value {
            font-size: 1.3em;
            color: #10b981;
            font-weight: 600;
        }

        .assets-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .asset {
            padding: 12px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid rgba(6, 182, 212, 0.5);
        }

        .asset-symbol {
            font-weight: 600;
            color: #06b6d4;
        }

        .asset-amount {
            color: #cbd5e1;
            font-size: 0.9em;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid rgba(6, 182, 212, 0.2);
            border-top: 4px solid #06b6d4;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #cbd5e1;
            font-size: 1.1em;
        }

        @media (max-width: 768px) {
            .header {
                padding: 30px;
            }

            .header h1 {
                font-size: 2em;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .stat-value {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- HEADER -->
    <div class="header">
        <h1>💼 Portfolio Tracker IA</h1>
        <p>Suivi complet de tous vos portefeuilles crypto en temps réel</p>
    </div>

    <!-- STATS -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">💰 Valeur Totale</div>
            <div class="stat-value" id="totalValue">$0.00</div>
            <div class="stat-sub" id="totalSubtitle">--</div>
        </div>

        <div class="stat-card">
            <div class="stat-label">📊 Nombre d'Exchanges</div>
            <div class="stat-value" id="exchangeCount">0</div>
            <div class="stat-sub" id="exchangeSubtitle">--</div>
        </div>

        <div class="stat-card">
            <div class="stat-label">💎 Total Assets</div>
            <div class="stat-value" id="assetCount">0</div>
            <div class="stat-sub" id="assetSubtitle">--</div>
        </div>

        <div class="stat-card">
            <div class="stat-label">⏱️ Dernière Mise à Jour</div>
            <div class="stat-sub" id="lastUpdate">Jamais</div>
        </div>
    </div>

    <!-- FORM -->
    <div class="form-section">
        <h2>🔗 Connecter un Exchange</h2>
        
        <div class="form-row">
            <div class="form-group">
                <label>Exchange</label>
                <select id="exchange">
                    <option value="">-- Sélectionnez --</option>
                    <option value="binance">Binance</option>
                    <option value="mexc">MEXC</option>
                    <option value="coinbase">Coinbase</option>
                    <option value="bitget">Bitget</option>
                    <option value="kraken">Kraken</option>
                    <option value="bybit">Bybit</option>
                    <option value="okx">OKX</option>
                    <option value="ftx">FTX</option>
                </select>
            </div>

            <div class="form-group">
                <label>API Key</label>
                <input type="text" id="apiKey" placeholder="Votre clé API...">
            </div>

            <div class="form-group">
                <label>API Secret</label>
                <input type="password" id="apiSecret" placeholder="Votre secret...">
            </div>

            <div class="form-group">
                <label>Passphrase (optionnel)</label>
                <input type="password" id="passphrase" placeholder="Si requis par l'exchange...">
            </div>
        </div>

        <div class="buttons">
            <button class="btn btn-connect" onclick="connectExchange()">✅ Connecter</button>
            <button class="btn btn-refresh" onclick="refreshData()">🔄 Rafraîchir Tous</button>
            <button class="btn btn-refresh" onclick="clearForm()">❌ Réinitialiser</button>
        </div>

        <div id="message" class="message"></div>
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Connexion en cours...</p>
        </div>
    </div>

    <!-- HOLDINGS -->
    <div class="holdings-section">
        <h2>📈 Mes Holdings</h2>
        <div id="holdingsContainer" class="holdings-grid">
            <div class="no-data">Connectez un exchange pour voir vos holdings</div>
        </div>
    </div>
</div>

<script>
// ========================================================================
// FONCTIONS PRINCIPALES
// ========================================================================

async function connectExchange() {
    const exchange = document.getElementById('exchange').value;
    const apiKey = document.getElementById('apiKey').value;
    const apiSecret = document.getElementById('apiSecret').value;
    const passphrase = document.getElementById('passphrase').value;
    
    // Validation
    if (!exchange) {
        showMessage('Sélectionnez un exchange', 'error');
        return;
    }
    
    if (!apiKey || !apiSecret) {
        showMessage('Remplissez la clé API et le secret', 'error');
        return;
    }
    
    showLoading(true);
    
    try {
        const response = await fetch('/api/portfolio/connect', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                exchange: exchange,
                api_key: apiKey,
                api_secret: apiSecret,
                passphrase: passphrase || undefined
            })
        });
        
        const data = await response.json();
        
        if (data.success) {
            showMessage(`✅ ${data.exchange} connecté! ${data.holdings_count} assets trouvés`, 'success');
            clearForm();
            await loadPortfolioData();
        } else {
            showMessage(`❌ ${data.message}`, 'error');
        }
        
    } catch (error) {
        showMessage(`❌ Erreur: ${error.message}`, 'error');
    } finally {
        showLoading(false);
    }
}

async function loadPortfolioData() {
    try {
        const response = await fetch('/api/portfolio/data');
        const data = await response.json();
        
        if (data.success) {
            updateStats(data);
            displayHoldings(data.exchanges);
        }
        
    } catch (error) {
        console.error('Erreur chargement données:', error);
    }
}

async function refreshData() {
    showLoading(true);
    
    try {
        const response = await fetch('/api/portfolio/refresh', {
            method: 'POST'
        });
        
        const data = await response.json();
        
        if (data.success) {
            showMessage(`✅ ${data.message}`, 'success');
            await loadPortfolioData();
        } else {
            showMessage(`❌ ${data.message}`, 'error');
        }
        
    } catch (error) {
        showMessage(`❌ Erreur: ${error.message}`, 'error');
    } finally {
        showLoading(false);
    }
}

function updateStats(data) {
    const totalValue = data.total_portfolio_value || 0;
    const exchangeCount = data.number_of_exchanges || 0;
    
    // Calculer le total d'assets
    let totalAssets = 0;
    for (const exchange in data.exchanges) {
        totalAssets += data.exchanges[exchange].count || 0;
    }
    
    document.getElementById('totalValue').textContent = `$${totalValue.toLocaleString('en-US', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
    })}`;
    
    document.getElementById('exchangeCount').textContent = exchangeCount;
    document.getElementById('assetCount').textContent = totalAssets;
    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('fr-FR');
}

function displayHoldings(exchanges) {
    const container = document.getElementById('holdingsContainer');
    
    if (!exchanges || Object.keys(exchanges).length === 0) {
        container.innerHTML = '<div class="no-data">Aucun exchange connecté</div>';
        return;
    }
    
    let html = '';
    
    for (const exchange in exchanges) {
        const data = exchanges[exchange];
        const value = data.value || 0;
        const holdings = data.holdings || [];
        
        html += `
            <div class="exchange-card">
                <div class="exchange-header">
                    <div class="exchange-name">${exchange}</div>
                    <div class="exchange-value">$${value.toLocaleString('en-US', {
                        minimumFractionDigits: 2,
                        maximumFractionDigits: 2
                    })}</div>
                </div>
                
                <div class="assets-list">
        `;
        
        holdings.forEach(asset => {
            const assetValue = asset.value || 0;
            html += `
                <div class="asset">
                    <div>
                        <div class="asset-symbol">${asset.symbol}</div>
                        <div class="asset-amount">${asset.amount.toFixed(8)} @ $${(asset.price || 0).toFixed(2)}</div>
                    </div>
                    <div style="text-align: right; color: #10b981;">
                        $${assetValue.toLocaleString('en-US', {
                            minimumFractionDigits: 2,
                            maximumFractionDigits: 2
                        })}
                    </div>
                </div>
            `;
        });
        
        html += `
                </div>
                <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(6, 182, 212, 0.2); text-align: right; color: #cbd5e1; font-size: 0.9em;">
                    ${holdings.length} assets
                </div>
            </div>
        `;
    }
    
    container.innerHTML = html;
}

function showMessage(msg, type) {
    const messageEl = document.getElementById('message');
    messageEl.textContent = msg;
    messageEl.className = `message show ${type}`;
    
    setTimeout(() => {
        messageEl.classList.remove('show');
    }, 5000);
}

function showLoading(show) {
    document.getElementById('loading').classList.toggle('show', show);
}

function clearForm() {
    document.getElementById('exchange').value = '';
    document.getElementById('apiKey').value = '';
    document.getElementById('apiSecret').value = '';
    document.getElementById('passphrase').value = '';
}

// Charger les données au démarrage
window.addEventListener('load', loadPortfolioData);

// Rafraîchir toutes les 5 minutes
setInterval(loadPortfolioData, 5 * 60 * 1000);
</script>

</body>
</html>
