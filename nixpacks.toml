# Configuration Nixpacks pour Railway (alternative au Dockerfile)
[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = ["pip install -r requirements-minimal.txt"]

[start]
cmd = "sh -c 'python -m uvicorn main:app --host 0.0.0.0 --port ${PORT:-8080}'"

[variables]
PYTHONDONTWRITEBYTECODE = "1"
PYTHONUNBUFFERED = "1"